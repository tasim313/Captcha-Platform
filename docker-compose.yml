version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: captcha_postgres
    environment:
      POSTGRES_DB: captcha_platform
      POSTGRES_USER: captcha_user
      POSTGRES_PASSWORD: secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U captcha_user -d captcha_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - captcha_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: captcha_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - captcha_network

  # Django Application
  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: captcha_django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - captcha_network

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: captcha_celery_worker
    command: celery -A config.celery worker -l INFO -c 4 --max-tasks-per-child=1000 -Q default,captcha_solving
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - captcha_network

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: captcha_celery_beat
    command: celery -A config.celery beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - captcha_network

  # Flower (Celery Monitoring)
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: captcha_flower
    command: celery -A config.celery flower --port=5555 --basic_auth=admin:admin
    volumes:
      - .:/app
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - captcha_network

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

networks:
  captcha_network:
    driver: bridge